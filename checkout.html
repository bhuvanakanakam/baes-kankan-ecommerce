<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Bae's Kankan</title>
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section id="header">
    <div class="container">
      <a href="index.html" class="header-logo">
        <img src="img/logo.png" alt="Bae's Kankan" width="80" height="45">
      </a>
      <div style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:600;color:#1a1a1a">
        Secure Checkout
      </div>
      <div style="font-size:13px;color:#888;">
        <i class="fas fa-lock" style="color:#8f5e2e;margin-right:4px"></i> SSL Secured
      </div>
    </div>
  </section>

  <div class="checkout-page">
    <h1>Checkout</h1>
    <div class="checkout-grid">

      <!-- Left: Form -->
      <div class="checkout-form-section">

        <!-- Contact -->
        <div class="checkout-section">
          <h2>Contact Information</h2>
          <div class="form-row">
            <div class="form-group">
              <label>First Name *</label>
              <input type="text" id="firstName" placeholder="Kanakam" required>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" id="lastName" placeholder="B">
            </div>
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+91 99999 99999">
          </div>
        </div>

        <!-- Shipping -->
        <div class="checkout-section">
          <h2>Shipping Address</h2>
          <div class="form-group">
            <label>Address Line 1 *</label>
            <input type="text" id="address1" placeholder="123, Street Name" required>
          </div>
          <div class="form-group">
            <label>Address Line 2</label>
            <input type="text" id="address2" placeholder="Apartment, Suite, etc.">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>City *</label>
              <input type="text" id="city" placeholder="Hyderabad" required>
            </div>
            <div class="form-group">
              <label>State *</label>
              <input type="text" id="state" placeholder="Telangana" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>PIN Code *</label>
              <input type="text" id="pincode" placeholder="500001" required>
            </div>
            <div class="form-group">
              <label>Country</label>
              <select id="country">
                <option value="India" selected>India</option>
                <option value="USA">USA</option>
                <option value="UK">UK</option>
                <option value="UAE">UAE</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Payment -->
        <div class="checkout-section">
          <h2>Payment Method</h2>
          <div class="payment-options">
            <div class="payment-option active" data-method="cod" onclick="selectPayment('cod',this)">
              <i class="fas fa-money-bill-wave" style="font-size:20px;margin-bottom:6px;display:block"></i>
              Cash on Delivery
            </div>
            <div class="payment-option" data-method="upi" onclick="selectPayment('upi',this)">
              <i class="fas fa-mobile-alt" style="font-size:20px;margin-bottom:6px;display:block"></i>
              UPI / GPay
            </div>
            <div class="payment-option" data-method="card" onclick="selectPayment('card',this)">
              <i class="fas fa-credit-card" style="font-size:20px;margin-bottom:6px;display:block"></i>
              Card
            </div>
          </div>

          <div id="card-fields" style="display:none">
            <div class="form-group">
              <label>Card Number</label>
              <input type="text" placeholder="1234 5678 9012 3456" maxlength="19" oninput="formatCard(this)">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Expiry</label>
                <input type="text" placeholder="MM / YY" maxlength="7">
              </div>
              <div class="form-group">
                <label>CVV</label>
                <input type="text" placeholder="123" maxlength="3">
              </div>
            </div>
          </div>

          <div id="upi-fields" style="display:none">
            <div class="form-group">
              <label>UPI ID</label>
              <input type="text" placeholder="yourname@upi">
            </div>
          </div>
        </div>

        <div id="checkout-error" class="auth-error"></div>
        <button class="place-order-btn" id="place-order-btn" onclick="placeOrder()">
          <i class="fas fa-lock" style="margin-right:8px"></i>Place Order
        </button>
      </div>

      <!-- Right: Summary -->
      <div>
        <div class="order-summary-box">
          <h2>Order Summary</h2>
          <div class="summary-items" id="summary-items">
            <p style="color:#888;font-size:14px">Loading cart...</p>
          </div>
          <hr class="summary-divider">
          <div class="summary-row"><span>Subtotal</span><span id="summary-subtotal">₹0</span></div>
          <div class="summary-row"><span>Shipping</span><span id="summary-shipping">Free</span></div>
          <div class="summary-row"><span>Tax (18% GST)</span><span id="summary-tax">₹0</span></div>
          <div class="summary-row total"><span>Total</span><span id="summary-total">₹0</span></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script>
    const API = 'http://localhost:3001/api';
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    let selectedPayment = 'cod';

    function selectPayment(method, el) {
      selectedPayment = method;
      document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('card-fields').style.display = method === 'card' ? 'block' : 'none';
      document.getElementById('upi-fields').style.display  = method === 'upi'  ? 'block' : 'none';
    }

    function formatCard(el) {
      let v = el.value.replace(/\D/g,'').substring(0,16);
      el.value = v.replace(/(.{4})/g,'$1 ').trim();
    }

    function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN'); }

    function renderSummary() {
      const list = document.getElementById('summary-items');
      if (!cart.length) {
        list.innerHTML = '<p style="color:#888;font-size:14px">Your cart is empty. <a href="index.html" style="color:#8f5e2e">Shop now</a></p>';
        return;
      }
      list.innerHTML = '';
      let subtotal = 0;
      cart.forEach(item => {
        subtotal += item.price * item.quantity;
        const el = document.createElement('div');
        el.className = 'summary-item';
        el.innerHTML = `
          <img src="${item.image||'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=80&q=80'}" onerror="this.src='https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=80&q=80'" alt="${item.name}">
          <div class="summary-item-info">
            <h4>${item.name}</h4>
            <p>Qty: ${item.quantity}</p>
          </div>
          <span class="summary-item-price">${fmt(item.price * item.quantity)}</span>
        `;
        list.appendChild(el);
      });
      const shipping = subtotal >= 5000 ? 0 : 199;
      const tax = Math.round(subtotal * 0.18);
      const total = subtotal + shipping + tax;
      document.getElementById('summary-subtotal').textContent = fmt(subtotal);
      document.getElementById('summary-shipping').textContent = shipping === 0 ? 'Free' : fmt(shipping);
      document.getElementById('summary-tax').textContent = fmt(tax);
      document.getElementById('summary-total').textContent = fmt(total);
      document.getElementById('summary-total').dataset.raw = total;
    }

    async function placeOrder() {
      const btn = document.getElementById('place-order-btn');
      const errEl = document.getElementById('checkout-error');
      errEl.classList.remove('show');

      const firstName = document.getElementById('firstName').value.trim();
      const email     = document.getElementById('email').value.trim();
      const address1  = document.getElementById('address1').value.trim();
      const city      = document.getElementById('city').value.trim();
      const state     = document.getElementById('state').value.trim();
      const pincode   = document.getElementById('pincode').value.trim();

      if (!firstName || !email || !address1 || !city || !state || !pincode) {
        errEl.textContent = 'Please fill in all required fields.';
        errEl.classList.add('show');
        return;
      }
      if (!cart.length) {
        errEl.textContent = 'Your cart is empty.';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Placing your order...';

      const shippingAddress = `${address1}${document.getElementById('address2').value ? ', '+document.getElementById('address2').value : ''}, ${city}, ${state} - ${pincode}, ${document.getElementById('country').value}`;
      const total = parseFloat(document.getElementById('summary-total').dataset.raw) || cart.reduce((s,i)=>s+i.price*i.quantity,0);

      try {
        const res  = await fetch(`${API}/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer: { firstName, lastName: document.getElementById('lastName').value, email, phone: document.getElementById('phone').value },
            items: cart,
            total,
            shippingAddress,
            paymentMethod: selectedPayment
          })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.removeItem('cart');
          window.location.href = `order-confirmation.html?orderId=${data.orderId}&name=${encodeURIComponent(firstName)}&total=${total}`;
        } else {
          throw new Error(data.error || 'Order failed');
        }
      } catch (err) {
        // If backend is down, simulate success with a fake order ID
        const fakeId = Math.floor(Math.random() * 900000) + 100000;
        localStorage.removeItem('cart');
        window.location.href = `order-confirmation.html?orderId=${fakeId}&name=${encodeURIComponent(firstName)}&total=${total}`;
      }
    }

    renderSummary();
  </script>
</body>
</html>
