<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — Bae's Kankan</title>
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <section id="header">
    <div class="container">
      <a href="index.html" class="header-logo">
        <span class="header-logo-text">Bae's Kankan</span>
      </a>
    </div>
  </section>

  <div class="confirmation-page">
    <div class="confirmation-icon">
      <i class="fas fa-check-circle"></i>
    </div>
    <h1>Order Confirmed!</h1>
    <p class="order-id">Thank you, <strong id="conf-name"></strong>! Your order <span id="conf-order-id"></span> has been placed successfully.</p>

    <div class="confirmation-details" id="conf-details">
      <h3>Order Summary</h3>
      <div id="conf-items"></div>
      <div class="confirmation-total">
        <span>Total Paid</span>
        <span id="conf-total"></span>
      </div>
    </div>

    <p style="font-size:14px;color:#888;margin-bottom:28px;">
      A confirmation email will be sent to you shortly.<br>
      Estimated delivery: <strong style="color:#1a1a1a">3–5 business days</strong>
    </p>

    <a href="index.html" class="btn-continue">Continue Shopping</a>
  </div>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const orderId  = params.get('orderId');
    const name     = params.get('name') || 'Customer';
    const total    = params.get('total');

    document.getElementById('conf-name').textContent     = decodeURIComponent(name);
    document.getElementById('conf-order-id').innerHTML   = `<span>#${orderId}</span>`;
    document.getElementById('conf-total').textContent    = '₹' + Number(total).toLocaleString('en-IN');

    // Try to fetch real order items from API, fallback to nothing
    async function loadOrderItems() {
      const itemsEl = document.getElementById('conf-items');
      try {
        const res  = await fetch(`http://localhost:3001/api/orders/${orderId}`);
        const data = await res.json();
        if (data.success && data.items?.length) {
          itemsEl.innerHTML = '';
          data.items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'confirmation-item';
            row.innerHTML = `<span>${item.ProductName} × ${item.Quantity}</span><span>₹${Number(item.UnitPrice * item.Quantity).toLocaleString('en-IN')}</span>`;
            itemsEl.appendChild(row);
          });
          return;
        }
      } catch {}
      itemsEl.innerHTML = '<p style="font-size:14px;color:#888">Items have been confirmed.</p>';
    }

    loadOrderItems();
  </script>
</body>
</html>
