<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Bae's Kankan</title>
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-page">

    <!-- Left brand panel -->
    <div class="auth-left">
      <div class="brand">Bae's Kankan</div>
      <p>Welcome back! Sign in to access your orders, wishlist, and exclusive member deals.</p>
      <div style="margin-top:40px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center">
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:700">10K+</div>
          <div style="font-size:12px;opacity:0.7;margin-top:4px">Happy Customers</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:700">500+</div>
          <div style="font-size:12px;opacity:0.7;margin-top:4px">Premium Products</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:28px;font-weight:700">Free</div>
          <div style="font-size:12px;opacity:0.7;margin-top:4px">Returns & Exchanges</div>
        </div>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="auth-right">
      <div class="auth-box">
        <h2>Sign In</h2>
        <p class="auth-sub">Don't have an account? <a href="signup.html">Create one free</a></p>

        <div class="auth-error" id="login-error"></div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com"
                 onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="form-group">
          <label>Password</label>
          <div style="position:relative">
            <input type="password" id="login-password" placeholder="••••••••" style="width:100%"
                   onkeydown="if(event.key==='Enter')doLogin()">
            <button onclick="togglePw('login-password',this)" type="button"
              style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;font-size:14px">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div style="text-align:right;margin-bottom:20px">
          <a href="#" style="font-size:13px;color:#8f5e2e">Forgot password?</a>
        </div>

        <button class="auth-submit" id="login-btn" onclick="doLogin()">Sign In</button>

        <div class="auth-switch">New to Bae's Kankan? <a href="signup.html">Create account</a></div>
      </div>
    </div>
  </div>

  <script>
    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      if (inp.type === 'password') { inp.type = 'text'; btn.innerHTML = '<i class="fas fa-eye-slash"></i>'; }
      else { inp.type = 'password'; btn.innerHTML = '<i class="fas fa-eye"></i>'; }
    }

    async function doLogin() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errEl    = document.getElementById('login-error');
      const btn      = document.getElementById('login-btn');
      errEl.classList.remove('show');

      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.classList.add('show'); return;
      }

      btn.disabled = true; btn.textContent = 'Signing in...';

      try {
        const res  = await fetch('http://localhost:3001/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user',  JSON.stringify(data.user));
          const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
          window.location.href = redirect;
        } else {
          errEl.textContent = data.error || 'Login failed. Please try again.';
          errEl.classList.add('show');
          btn.disabled = false; btn.textContent = 'Sign In';
        }
      } catch {
        // Offline fallback: let user in as guest
        const fakeUser = { email, fullName: email.split('@')[0] };
        localStorage.setItem('user', JSON.stringify(fakeUser));
        window.location.href = 'index.html';
      }
    }

    // Already logged in?
    if (localStorage.getItem('token')) window.location.href = 'index.html';
  </script>
</body>
</html>
